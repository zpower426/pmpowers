<h2>步骤 2：确定北极星指标 (NSM)</h2>
<p class="subtitle">参考 Superpowers 渲染方式：使用专业交互组件</p>

<div class="options">
  <div class="option" data-choice="efficiency" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>采集效率 (Efficiency)</h3>
      <p>衡量指标：每周成功入库的标签数量。适用于早期快速跑通流程。</p>
    </div>
  </div>
  
  <div class="option" data-choice="coverage" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>覆盖广度 (Coverage)</h3>
      <p>衡量指标：接入的第三方平台数量。适用于横向扩张阶段。</p>
    </div>
  </div>
  
  <div class="option" data-choice="collaboration" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>协作深度 (Collaboration)</h3>
      <p>衡量指标：标签被跨团队调用的次数。适用于成熟期资产沉淀。</p>
    </div>
  </div>
</div>
