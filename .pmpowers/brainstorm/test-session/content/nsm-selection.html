<h2>步骤 2：确定北极星指标 (NSM)</h2>
<p class="subtitle">标签采集平台的成功标准是什么？</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>采集效率 (Efficiency)</h3>
      <p>每周成功采集并入库的有效标签数量。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>覆盖广度 (Coverage)</h3>
      <p>平台支持采集的第三方应用或站点的覆盖率。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>协作深度 (Collaboration)</h3>
      <p>多部门通过该平台共享和复用标签的频率。</p>
    </div>
  </div>
</div>
